<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" width="680" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16"/>
      <stop offset="40%" stop-color="#12102e"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#e0d5ff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="240" fill="url(#bgGrad)"/>

  <!-- Subtle diagonals -->
  <line x1="0" y1="240" x2="680" y2="0" stroke="#8b5cf6" stroke-width="0.3" opacity="0.05"/>
  <line x1="80" y1="240" x2="680" y2="60" stroke="#06b6d4" stroke-width="0.3" opacity="0.04"/>

  <!-- Accent line -->
  <rect x="0" y="175" width="680" height="1" fill="url(#lineGlow)"/>

  <!-- Ambient glow -->
  <circle cx="170" cy="120" r="90" fill="#8b5cf6" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="520" cy="130" r="70" fill="#06b6d4" opacity="0.03" filter="url(#bigGlow)"/>

  <!-- Particles -->
  <circle cx="40" cy="35" r="1.5" fill="#8b5cf6" opacity="0.35" filter="url(#neon)"/>
  <circle cx="650" cy="30" r="1" fill="#06b6d4" opacity="0.3" filter="url(#neon)"/>
  <circle cx="30" cy="210" r="1" fill="#06b6d4" opacity="0.25" filter="url(#neon)"/>
  <circle cx="660" cy="215" r="1.5" fill="#8b5cf6" opacity="0.3" filter="url(#neon)"/>
  <circle cx="340" cy="22" r="1" fill="#22d3ee" opacity="0.2" filter="url(#neon)"/>

  <!-- Robot (left) -->
  <g transform="translate(155, 105)">
    <!-- Antenna -->
    <line x1="0" y1="-52" x2="0" y2="-64" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" filter="url(#neon)"/>
    <circle cx="0" cy="-68" r="4.5" fill="#8b5cf6" filter="url(#bigGlow)"/>
    <circle cx="0" cy="-68" r="2.5" fill="#c4b5fd"/>

    <!-- Head -->
    <rect x="-38" y="-44" width="76" height="58" rx="12" fill="url(#bodyGrad)" stroke="#4b5563" stroke-width="1"/>

    <!-- Visor -->
    <rect x="-28" y="-30" width="56" height="18" rx="9" fill="url(#visor)" filter="url(#neon)" opacity="0.9"/>

    <!-- Eyes -->
    <circle cx="-10" cy="-21" r="3.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="10" cy="-21" r="3.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="-9" cy="-20" r="1.5" fill="#0a0a16"/>
    <circle cx="11" cy="-20" r="1.5" fill="#0a0a16"/>

    <!-- Mouth -->
    <line x1="-9" y1="-2" x2="9" y2="-2" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Ears -->
    <rect x="-46" y="-28" width="7" height="16" rx="3" fill="#4b5563"/>
    <rect x="39" y="-28" width="7" height="16" rx="3" fill="#4b5563"/>
    <rect x="-44" y="-23" width="4" height="3" rx="1" fill="#8b5cf6" filter="url(#neon)"/>
    <rect x="41" y="-23" width="4" height="3" rx="1" fill="#8b5cf6" filter="url(#neon)"/>

    <!-- Terminal body -->
    <rect x="-32" y="20" width="64" height="48" rx="7" fill="url(#termGrad)" stroke="#374151" stroke-width="1"/>
    <circle cx="-20" cy="29" r="2" fill="#ef4444" opacity="0.7"/>
    <circle cx="-13" cy="29" r="2" fill="#eab308" opacity="0.7"/>
    <circle cx="-6" cy="29" r="2" fill="#22c55e" opacity="0.7"/>
    <text x="-24" y="44" font-family="monospace" font-size="7" fill="#22d3ee" filter="url(#neon)">$ agent</text>
    <text x="-24" y="54" font-family="monospace" font-size="7" fill="#4ade80">✓ active</text>
    <!-- Cursor -->
    <rect x="-24" y="58" width="4" height="6" rx="1" fill="#22d3ee" opacity="0.7" filter="url(#neon)">
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <!-- Connection dashes -->
    <line x1="-14" y1="16" x2="-14" y2="20" stroke="#4b5563" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="14" y1="16" x2="14" y2="20" stroke="#4b5563" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Text (right) -->
  <g transform="translate(340, 80)">
    <text x="0" y="0" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#titleGrad)" filter="url(#textGlow)">Agent Activity</text>
    <text x="0" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#94a3b8">Discord Rich Presence for AI Agents</text>
    <rect x="0" y="38" width="120" height="1.5" rx="1" fill="#8b5cf6" opacity="0.35" filter="url(#neon)"/>
    <text x="0" y="60" font-family="monospace" font-size="11" fill="#22d3ee" opacity="0.75">🤖  Custom agent messages</text>
    <text x="0" y="78" font-family="monospace" font-size="11" fill="#a78bfa" opacity="0.75">🔄  Time-based rotation</text>
    <text x="0" y="96" font-family="monospace" font-size="11" fill="#4ade80" opacity="0.75">⚡  Auto-detect AI activity</text>
  </g>

  <!-- Code symbols -->
  <text x="290" y="48" font-family="monospace" font-size="14" fill="#8b5cf6" opacity="0.08" filter="url(#neon)">{</text>
  <text x="630" y="200" font-family="monospace" font-size="14" fill="#06b6d4" opacity="0.08" filter="url(#neon)">}</text>
</svg>
