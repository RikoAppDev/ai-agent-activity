<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sparkleGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="medGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smallGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="256" cy="256" r="120" fill="#8b5cf6" opacity="0.08" filter="url(#bigGlow)"/>

  <!-- Main 4-point sparkle -->
  <g transform="translate(256, 256)" filter="url(#bigGlow)">
    <!-- Vertical beam -->
    <path d="M0,-130 Q8,-30 0,0 Q-8,-30 0,-130 Z" fill="url(#sparkleGrad)" opacity="0.9"/>
    <path d="M0,130 Q-8,30 0,0 Q8,30 0,130 Z" fill="url(#sparkleGrad)" opacity="0.9"/>
    <!-- Horizontal beam -->
    <path d="M-130,0 Q-30,-8 0,0 Q-30,8 -130,0 Z" fill="url(#sparkleGrad)" opacity="0.9"/>
    <path d="M130,0 Q30,8 0,0 Q30,-8 130,0 Z" fill="url(#sparkleGrad)" opacity="0.9"/>
    <!-- Center core -->
    <circle cx="0" cy="0" r="16" fill="#e0d5ff" opacity="0.95"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
  </g>

  <!-- Diagonal sparkle beams (smaller) -->
  <g transform="translate(256, 256) rotate(45)" filter="url(#medGlow)">
    <path d="M0,-70 Q4,-20 0,0 Q-4,-20 0,-70 Z" fill="url(#sparkleGrad2)" opacity="0.6"/>
    <path d="M0,70 Q-4,20 0,0 Q4,20 0,70 Z" fill="url(#sparkleGrad2)" opacity="0.6"/>
    <path d="M-70,0 Q-20,-4 0,0 Q-20,4 -70,0 Z" fill="url(#sparkleGrad2)" opacity="0.6"/>
    <path d="M70,0 Q20,4 0,0 Q20,-4 70,0 Z" fill="url(#sparkleGrad2)" opacity="0.6"/>
  </g>

  <!-- Orbiting particles -->
  <circle cx="170" cy="160" r="5" fill="#22d3ee" opacity="0.7" filter="url(#smallGlow)"/>
  <circle cx="340" cy="350" r="4" fill="#a78bfa" opacity="0.6" filter="url(#smallGlow)"/>
  <circle cx="350" cy="175" r="3" fill="#8b5cf6" opacity="0.5" filter="url(#smallGlow)"/>
  <circle cx="165" cy="345" r="3.5" fill="#06b6d4" opacity="0.5" filter="url(#smallGlow)"/>

  <!-- Small secondary sparkles -->
  <g transform="translate(370, 140)" filter="url(#smallGlow)">
    <path d="M0,-18 Q2,-5 0,0 Q-2,-5 0,-18 Z" fill="#22d3ee" opacity="0.5"/>
    <path d="M0,18 Q-2,5 0,0 Q2,5 0,18 Z" fill="#22d3ee" opacity="0.5"/>
    <path d="M-18,0 Q-5,-2 0,0 Q-5,2 -18,0 Z" fill="#22d3ee" opacity="0.5"/>
    <path d="M18,0 Q5,2 0,0 Q5,-2 18,0 Z" fill="#22d3ee" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.8"/>
  </g>

  <g transform="translate(140, 370)" filter="url(#smallGlow)">
    <path d="M0,-15 Q2,-4 0,0 Q-2,-4 0,-15 Z" fill="#a78bfa" opacity="0.5"/>
    <path d="M0,15 Q-2,4 0,0 Q2,4 0,15 Z" fill="#a78bfa" opacity="0.5"/>
    <path d="M-15,0 Q-4,-2 0,0 Q-4,2 -15,0 Z" fill="#a78bfa" opacity="0.5"/>
    <path d="M15,0 Q4,2 0,0 Q4,-2 15,0 Z" fill="#a78bfa" opacity="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
