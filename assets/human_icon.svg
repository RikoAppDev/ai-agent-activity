<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="256" cy="220" r="100" fill="#22d3ee" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Person silhouette -->
  <g transform="translate(256, 200)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="42" fill="url(#personGrad)" filter="url(#glow)" opacity="0.9"/>
    <circle cx="0" cy="-60" r="38" fill="#1a1a2e"/>
    <circle cx="0" cy="-60" r="35" fill="url(#personGrad)" opacity="0.15"/>

    <!-- Face features -->
    <circle cx="-12" cy="-66" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
    <circle cx="12" cy="-66" r="4" fill="#22d3ee" opacity="0.8" filter="url(#glow)"/>
    <!-- Smile -->
    <path d="M-10,-48 Q0,-40 10,-48" stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>

    <!-- Body / shoulders -->
    <path d="M-70,40 Q-70,-10 -30,-15 Q0,-20 30,-15 Q70,-10 70,40" fill="url(#personGrad)" filter="url(#glow)" opacity="0.8"/>
    <path d="M-66,38 Q-66,-6 -28,-12 Q0,-16 28,-12 Q66,-6 66,38" fill="#1a1a2e"/>

    <!-- Chest area accent -->
    <path d="M-50,35 Q-50,5 -20,-2 Q0,-5 20,-2 Q50,5 50,35" fill="url(#personGrad)" opacity="0.1"/>

    <!-- Collar detail -->
    <path d="M-15,-12 L0,5 L15,-12" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Keyboard -->
  <g transform="translate(256, 360)">
    <rect x="-95" y="-20" width="190" height="55" rx="8" fill="url(#keyboardGrad)" stroke="#4b5563" stroke-width="1.5"/>

    <!-- Key rows -->
    <!-- Row 1 -->
    <rect x="-82" y="-12" width="14" height="10" rx="2" fill="#4b5563" opacity="0.8"/>
    <rect x="-64" y="-12" width="14" height="10" rx="2" fill="#4b5563" opacity="0.8"/>
    <rect x="-46" y="-12" width="14" height="10" rx="2" fill="#22d3ee" opacity="0.5" filter="url(#glow)"/>
    <rect x="-28" y="-12" width="14" height="10" rx="2" fill="#4b5563" opacity="0.8"/>
    <rect x="-10" y="-12" width="14" height="10" rx="2" fill="#4b5563" opacity="0.8"/>
    <rect x="8" y="-12" width="14" height="10" rx="2" fill="#4b5563" opacity="0.8"/>
    <rect x="26" y="-12" width="14" height="10" rx="2" fill="#8b5cf6" opacity="0.4" filter="url(#glow)"/>
    <rect x="44" y="-12" width="14" height="10" rx="2" fill="#4b5563" opacity="0.8"/>
    <rect x="62" y="-12" width="20" height="10" rx="2" fill="#4b5563" opacity="0.8"/>

    <!-- Row 2 -->
    <rect x="-82" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="-64" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="-46" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="-28" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="-10" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="8" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="26" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="44" y="2" width="14" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="62" y="2" width="20" height="10" rx="2" fill="#4b5563" opacity="0.7"/>

    <!-- Row 3 - spacebar -->
    <rect x="-82" y="16" width="14" height="10" rx="2" fill="#4b5563" opacity="0.6"/>
    <rect x="-64" y="16" width="14" height="10" rx="2" fill="#4b5563" opacity="0.6"/>
    <rect x="-46" y="16" width="80" height="10" rx="2" fill="#4b5563" opacity="0.7"/>
    <rect x="38" y="16" width="14" height="10" rx="2" fill="#4b5563" opacity="0.6"/>
    <rect x="56" y="16" width="26" height="10" rx="2" fill="#4b5563" opacity="0.6"/>
  </g>

  <!-- Floating code elements -->
  <text x="90" y="160" font-family="monospace" font-size="18" fill="#22d3ee" opacity="0.15" filter="url(#glow)">fn()</text>
  <text x="360" y="190" font-family="monospace" font-size="16" fill="#8b5cf6" opacity="0.15" filter="url(#glow)">{ }</text>
  <text x="380" y="310" font-family="monospace" font-size="14" fill="#22d3ee" opacity="0.1" filter="url(#glow)">;</text>
  <text x="85" y="330" font-family="monospace" font-size="16" fill="#8b5cf6" opacity="0.1" filter="url(#glow)">=&gt;</text>
</svg>
