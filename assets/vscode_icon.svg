<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b5797"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- VS Code window frame -->
  <g transform="translate(256, 256)">
    <!-- Main editor window -->
    <rect x="-150" y="-140" width="300" height="280" rx="12" fill="#1e1e2e" stroke="#374151" stroke-width="2"/>

    <!-- Title bar -->
    <rect x="-150" y="-140" width="300" height="28" rx="12" fill="#2d2d3f"/>
    <rect x="-150" y="-124" width="300" height="12" fill="#2d2d3f"/>
    <circle cx="-130" cy="-126" r="4.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="-114" cy="-126" r="4.5" fill="#eab308" opacity="0.7"/>
    <circle cx="-98" cy="-126" r="4.5" fill="#22c55e" opacity="0.7"/>

    <!-- Sidebar -->
    <rect x="-150" y="-112" width="50" height="252" fill="url(#sidebarGrad)"/>

    <!-- Sidebar icons -->
    <rect x="-138" y="-96" width="26" height="3" rx="1.5" fill="#64748b"/>
    <rect x="-138" y="-88" width="20" height="3" rx="1.5" fill="#64748b" opacity="0.6"/>
    <rect x="-138" y="-74" width="26" height="3" rx="1.5" fill="#0078d4" filter="url(#glow)"/>
    <rect x="-138" y="-66" width="18" height="3" rx="1.5" fill="#64748b" opacity="0.6"/>
    <rect x="-138" y="-52" width="24" height="3" rx="1.5" fill="#64748b"/>
    <rect x="-138" y="-44" width="16" height="3" rx="1.5" fill="#64748b" opacity="0.6"/>

    <!-- Editor area - code lines -->
    <rect x="-88" y="-96" width="60" height="3" rx="1.5" fill="#c792ea" opacity="0.8"/>
    <rect x="-22" y="-96" width="40" height="3" rx="1.5" fill="#82aaff" opacity="0.7"/>

    <rect x="-78" y="-84" width="45" height="3" rx="1.5" fill="#89ddff" opacity="0.7"/>
    <rect x="-28" y="-84" width="55" height="3" rx="1.5" fill="#c3e88d" opacity="0.7"/>

    <rect x="-78" y="-72" width="70" height="3" rx="1.5" fill="#ffcb6b" opacity="0.8"/>
    <rect x="0" y="-72" width="30" height="3" rx="1.5" fill="#f07178" opacity="0.7"/>

    <rect x="-78" y="-60" width="35" height="3" rx="1.5" fill="#82aaff" opacity="0.7"/>
    <rect x="-38" y="-60" width="50" height="3" rx="1.5" fill="#c3e88d" opacity="0.7"/>

    <rect x="-88" y="-48" width="25" height="3" rx="1.5" fill="#c792ea" opacity="0.6"/>

    <rect x="-78" y="-36" width="80" height="3" rx="1.5" fill="#89ddff" opacity="0.6"/>
    <rect x="10" y="-36" width="35" height="3" rx="1.5" fill="#ffcb6b" opacity="0.6"/>

    <rect x="-78" y="-24" width="55" height="3" rx="1.5" fill="#82aaff" opacity="0.7"/>

    <rect x="-88" y="-12" width="25" height="3" rx="1.5" fill="#c792ea" opacity="0.7"/>

    <!-- Cursor line highlight -->
    <rect x="-100" y="-52" width="248" height="14" rx="2" fill="#0078d4" opacity="0.1"/>

    <!-- Line numbers -->
    <text x="-95" y="-93" font-family="monospace" font-size="8" fill="#4a5568">1</text>
    <text x="-95" y="-81" font-family="monospace" font-size="8" fill="#4a5568">2</text>
    <text x="-95" y="-69" font-family="monospace" font-size="8" fill="#4a5568">3</text>
    <text x="-95" y="-57" font-family="monospace" font-size="8" fill="#4a5568">4</text>
    <text x="-95" y="-45" font-family="monospace" font-size="8" fill="#0078d4">5</text>
    <text x="-95" y="-33" font-family="monospace" font-size="8" fill="#4a5568">6</text>
    <text x="-95" y="-21" font-family="monospace" font-size="8" fill="#4a5568">7</text>
    <text x="-95" y="-9" font-family="monospace" font-size="8" fill="#4a5568">8</text>

    <!-- Bottom status bar -->
    <rect x="-150" y="116" width="300" height="24" rx="0" fill="#0078d4"/>
    <rect x="-150" y="128" width="300" height="12" rx="12" fill="#0078d4"/>
    <text x="-136" y="133" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.9">main</text>
    <text x="60" y="133" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.7">UTF-8</text>
    <text x="100" y="133" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.7">TS</text>

    <!-- Person icon overlay (bottom right) -->
    <g transform="translate(110, 80)">
      <circle cx="0" cy="-12" r="12" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
      <circle cx="0" cy="-18" r="6" fill="#22d3ee" opacity="0.7"/>
      <path d="M-10,-6 Q0,6 10,-6" stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.7"/>
    </g>
  </g>
</svg>
