<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="visor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="terminalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#glow)"/>
  <rect width="512" height="512" fill="url(#coreGlow)"/>

  <!-- Outer ring particles -->
  <circle cx="100" cy="120" r="2" fill="#8b5cf6" opacity="0.6" filter="url(#neon)"/>
  <circle cx="412" cy="100" r="1.5" fill="#06b6d4" opacity="0.5" filter="url(#neon)"/>
  <circle cx="80" cy="380" r="1.5" fill="#06b6d4" opacity="0.4" filter="url(#neon)"/>
  <circle cx="430" cy="400" r="2" fill="#8b5cf6" opacity="0.5" filter="url(#neon)"/>
  <circle cx="256" cy="60" r="1.5" fill="#22d3ee" opacity="0.3" filter="url(#neon)"/>

  <!-- Robot head -->
  <g transform="translate(256, 185)">
    <!-- Antenna -->
    <line x1="0" y1="-75" x2="0" y2="-95" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" filter="url(#neon)"/>
    <circle cx="0" cy="-100" r="7" fill="#8b5cf6" filter="url(#softGlow)"/>
    <circle cx="0" cy="-100" r="4" fill="#c4b5fd"/>

    <!-- Head shape -->
    <rect x="-65" y="-65" width="130" height="100" rx="20" fill="url(#bodyGrad)" stroke="#4b5563" stroke-width="1.5"/>

    <!-- Visor -->
    <rect x="-50" y="-40" width="100" height="32" rx="16" fill="url(#visor)" filter="url(#neon)" opacity="0.9"/>

    <!-- Eye dots -->
    <circle cx="-20" cy="-24" r="6" fill="#ffffff" opacity="0.95"/>
    <circle cx="20" cy="-24" r="6" fill="#ffffff" opacity="0.95"/>
    <circle cx="-18" cy="-23" r="2.5" fill="#0d0d1a"/>
    <circle cx="22" cy="-23" r="2.5" fill="#0d0d1a"/>

    <!-- Mouth / speaker grille -->
    <line x1="-18" y1="12" x2="18" y2="12" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="18" x2="12" y2="18" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>

    <!-- Ear modules -->
    <rect x="-78" y="-40" width="12" height="30" rx="4" fill="#4b5563" stroke="#6b7280" stroke-width="1"/>
    <rect x="66" y="-40" width="12" height="30" rx="4" fill="#4b5563" stroke="#6b7280" stroke-width="1"/>
    <rect x="-76" y="-32" width="8" height="4" rx="2" fill="#8b5cf6" filter="url(#neon)"/>
    <rect x="68" y="-32" width="8" height="4" rx="2" fill="#8b5cf6" filter="url(#neon)"/>
  </g>

  <!-- Terminal window (body) -->
  <g transform="translate(256, 350)">
    <!-- Terminal body -->
    <rect x="-100" y="-55" width="200" height="120" rx="12" fill="url(#terminalGrad)" stroke="#374151" stroke-width="2"/>

    <!-- Terminal title bar -->
    <rect x="-100" y="-55" width="200" height="24" rx="12" fill="#1f2937"/>
    <rect x="-100" y="-43" width="200" height="12" fill="#1f2937"/>
    <!-- Traffic lights -->
    <circle cx="-80" cy="-43" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="-66" cy="-43" r="4" fill="#eab308" opacity="0.8"/>
    <circle cx="-52" cy="-43" r="4" fill="#22c55e" opacity="0.8"/>

    <!-- Terminal text lines -->
    <text x="-82" y="-12" font-family="monospace" font-size="13" fill="#22d3ee" filter="url(#neon)">$ agent --run</text>
    <text x="-82" y="8" font-family="monospace" font-size="13" fill="#a78bfa">✓ connected</text>
    <text x="-82" y="28" font-family="monospace" font-size="13" fill="#4ade80">✓ coding...</text>

    <!-- Blinking cursor -->
    <rect x="-82" y="38" width="8" height="14" rx="1" fill="#22d3ee" opacity="0.8" filter="url(#neon)">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Side connection lines to head -->
    <line x1="-40" y1="-55" x2="-40" y2="-70" stroke="#4b5563" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="40" y1="-55" x2="40" y2="-70" stroke="#4b5563" stroke-width="2" stroke-dasharray="4,3"/>
  </g>

  <!-- Floating code brackets -->
  <text x="60" y="260" font-family="monospace" font-size="28" fill="#8b5cf6" opacity="0.3" filter="url(#neon)">{</text>
  <text x="430" y="300" font-family="monospace" font-size="28" fill="#06b6d4" opacity="0.3" filter="url(#neon)">}</text>
  <text x="400" y="170" font-family="monospace" font-size="20" fill="#8b5cf6" opacity="0.2" filter="url(#neon)">/&gt;</text>
  <text x="70" y="400" font-family="monospace" font-size="20" fill="#06b6d4" opacity="0.2" filter="url(#neon)">&lt;/</text>
</svg>
