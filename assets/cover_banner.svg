<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16"/>
      <stop offset="40%" stop-color="#12102e"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#e0d5ff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="15%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="85%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="576" x2="1024" y2="0" stroke="#8b5cf6" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="476" x2="1024" y2="100" stroke="#06b6d4" stroke-width="0.3" opacity="0.05"/>
  <line x1="100" y1="576" x2="1024" y2="100" stroke="#8b5cf6" stroke-width="0.3" opacity="0.04"/>

  <!-- Horizontal accent line -->
  <rect x="0" y="410" width="1024" height="1" fill="url(#lineGlow)"/>

  <!-- Ambient glow spots -->
  <circle cx="280" cy="280" r="160" fill="#8b5cf6" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="750" cy="300" r="120" fill="#06b6d4" opacity="0.03" filter="url(#bigGlow)"/>

  <!-- Floating particles -->
  <circle cx="80" cy="80" r="2" fill="#8b5cf6" opacity="0.4" filter="url(#neon)"/>
  <circle cx="950" cy="60" r="1.5" fill="#06b6d4" opacity="0.3" filter="url(#neon)"/>
  <circle cx="60" cy="480" r="1.5" fill="#06b6d4" opacity="0.3" filter="url(#neon)"/>
  <circle cx="970" cy="500" r="2" fill="#8b5cf6" opacity="0.35" filter="url(#neon)"/>
  <circle cx="500" cy="50" r="1" fill="#22d3ee" opacity="0.25" filter="url(#neon)"/>
  <circle cx="180" cy="520" r="1.5" fill="#a78bfa" opacity="0.2" filter="url(#neon)"/>
  <circle cx="850" cy="150" r="1" fill="#a78bfa" opacity="0.2" filter="url(#neon)"/>

  <!-- Robot (left side) -->
  <g transform="translate(260, 250)">
    <!-- Antenna -->
    <line x1="0" y1="-82" x2="0" y2="-100" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" filter="url(#neon)"/>
    <circle cx="0" cy="-106" r="7" fill="#8b5cf6" filter="url(#bigGlow)"/>
    <circle cx="0" cy="-106" r="4" fill="#c4b5fd"/>

    <!-- Head -->
    <rect x="-60" y="-70" width="120" height="90" rx="18" fill="url(#bodyGrad)" stroke="#4b5563" stroke-width="1.5"/>

    <!-- Visor -->
    <rect x="-44" y="-46" width="88" height="28" rx="14" fill="url(#visor)" filter="url(#neon)" opacity="0.9"/>

    <!-- Eyes -->
    <circle cx="-16" cy="-32" r="5.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="16" cy="-32" r="5.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="-14" cy="-31" r="2.2" fill="#0a0a16"/>
    <circle cx="18" cy="-31" r="2.2" fill="#0a0a16"/>

    <!-- Mouth -->
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="6" x2="8" y2="6" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Ears -->
    <rect x="-72" y="-44" width="11" height="26" rx="4" fill="#4b5563"/>
    <rect x="61" y="-44" width="11" height="26" rx="4" fill="#4b5563"/>
    <rect x="-70" y="-36" width="7" height="4" rx="1.5" fill="#8b5cf6" filter="url(#neon)"/>
    <rect x="63" y="-36" width="7" height="4" rx="1.5" fill="#8b5cf6" filter="url(#neon)"/>

    <!-- Body / Terminal -->
    <rect x="-50" y="30" width="100" height="70" rx="10" fill="url(#termGrad)" stroke="#374151" stroke-width="1.5"/>
    <!-- Title bar -->
    <circle cx="-34" cy="42" r="3" fill="#ef4444" opacity="0.7"/>
    <circle cx="-23" cy="42" r="3" fill="#eab308" opacity="0.7"/>
    <circle cx="-12" cy="42" r="3" fill="#22c55e" opacity="0.7"/>
    <!-- Terminal lines -->
    <text x="-38" y="62" font-family="monospace" font-size="10" fill="#22d3ee" filter="url(#neon)">$ agent</text>
    <text x="-38" y="76" font-family="monospace" font-size="10" fill="#4ade80">✓ running</text>
    <!-- Cursor -->
    <rect x="-38" y="82" width="6" height="10" rx="1" fill="#22d3ee" opacity="0.7" filter="url(#neon)">
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <!-- Connection dashes -->
    <line x1="-24" y1="24" x2="-24" y2="30" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="24" y1="24" x2="24" y2="30" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- Right side text content -->
  <g transform="translate(540, 200)">
    <!-- Title -->
    <text x="0" y="0" font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="700" fill="url(#titleGrad)" filter="url(#textGlow)">Agent Activity</text>

    <!-- Subtitle -->
    <text x="0" y="40" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" fill="#94a3b8">Discord Rich Presence for AI Agents</text>

    <!-- Divider -->
    <rect x="0" y="56" width="180" height="2" rx="1" fill="#8b5cf6" opacity="0.4" filter="url(#neon)"/>

    <!-- Feature lines -->
    <text x="0" y="84" font-family="monospace" font-size="13" fill="#22d3ee" opacity="0.8">🤖  Custom agent messages</text>
    <text x="0" y="108" font-family="monospace" font-size="13" fill="#a78bfa" opacity="0.8">🔄  Time-based rotation</text>
    <text x="0" y="132" font-family="monospace" font-size="13" fill="#4ade80" opacity="0.8">⚡  Auto-detect AI activity</text>
  </g>

  <!-- Floating code symbols (atmosphere) -->
  <text x="440" y="120" font-family="monospace" font-size="22" fill="#8b5cf6" opacity="0.1" filter="url(#neon)">{</text>
  <text x="920" y="460" font-family="monospace" font-size="22" fill="#06b6d4" opacity="0.1" filter="url(#neon)">}</text>
  <text x="130" y="460" font-family="monospace" font-size="16" fill="#8b5cf6" opacity="0.08" filter="url(#neon)">&lt;/&gt;</text>
  <text x="880" y="120" font-family="monospace" font-size="16" fill="#06b6d4" opacity="0.08" filter="url(#neon)">( )</text>

  <!-- Bottom sparkle accents -->
  <g transform="translate(470, 110)" filter="url(#neon)">
    <path d="M0,-12 Q1.5,-3 0,0 Q-1.5,-3 0,-12 Z" fill="#22d3ee" opacity="0.3"/>
    <path d="M0,12 Q-1.5,3 0,0 Q1.5,3 0,12 Z" fill="#22d3ee" opacity="0.3"/>
    <path d="M-12,0 Q-3,-1.5 0,0 Q-3,1.5 -12,0 Z" fill="#22d3ee" opacity="0.3"/>
    <path d="M12,0 Q3,1.5 0,0 Q3,-1.5 12,0 Z" fill="#22d3ee" opacity="0.3"/>
    <circle cx="0" cy="0" r="2" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
