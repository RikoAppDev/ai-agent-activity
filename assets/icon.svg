<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </radialGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="128" cy="115" r="70" fill="#8b5cf6" opacity="0.08" filter="url(#bigGlow)"/>

  <!-- Robot head -->
  <g transform="translate(128, 100)">
    <!-- Antenna -->
    <line x1="0" y1="-42" x2="0" y2="-52" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="0" cy="-55" r="5" fill="#8b5cf6" filter="url(#bigGlow)"/>
    <circle cx="0" cy="-55" r="3" fill="#c4b5fd"/>

    <!-- Head -->
    <rect x="-38" y="-35" width="76" height="58" rx="14" fill="url(#body)" stroke="#4b5563" stroke-width="1.5"/>

    <!-- Visor -->
    <rect x="-28" y="-22" width="56" height="20" rx="10" fill="url(#visor)" filter="url(#glow)" opacity="0.9"/>

    <!-- Eyes -->
    <circle cx="-11" cy="-12" r="4" fill="#ffffff" opacity="0.95"/>
    <circle cx="11" cy="-12" r="4" fill="#ffffff" opacity="0.95"/>
    <circle cx="-10" cy="-11" r="1.8" fill="#0d0d1a"/>
    <circle cx="12" cy="-11" r="1.8" fill="#0d0d1a"/>

    <!-- Mouth -->
    <line x1="-10" y1="8" x2="10" y2="8" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Ears -->
    <rect x="-46" y="-20" width="8" height="18" rx="3" fill="#4b5563"/>
    <rect x="38" y="-20" width="8" height="18" rx="3" fill="#4b5563"/>
    <rect x="-44" y="-14" width="4" height="4" rx="1" fill="#8b5cf6" filter="url(#glow)"/>
    <rect x="40" y="-14" width="4" height="4" rx="1" fill="#8b5cf6" filter="url(#glow)"/>
  </g>

  <!-- Terminal body -->
  <g transform="translate(128, 185)">
    <rect x="-55" y="-28" width="110" height="62" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>

    <!-- Title bar dots -->
    <circle cx="-40" cy="-18" r="2.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="-31" cy="-18" r="2.5" fill="#eab308" opacity="0.7"/>
    <circle cx="-22" cy="-18" r="2.5" fill="#22c55e" opacity="0.7"/>

    <!-- Text lines -->
    <text x="-42" y="-2" font-family="monospace" font-size="8" fill="#22d3ee" filter="url(#glow)">$ agent</text>
    <text x="-42" y="10" font-family="monospace" font-size="8" fill="#4ade80">✓ active</text>

    <!-- Cursor -->
    <rect x="-42" y="16" width="5" height="8" rx="1" fill="#22d3ee" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Connection lines -->
    <line x1="-20" y1="-28" x2="-20" y2="-38" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="20" y1="-28" x2="20" y2="-38" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- Sparkle particles -->
  <circle cx="52" cy="70" r="1.5" fill="#8b5cf6" opacity="0.5" filter="url(#glow)"/>
  <circle cx="204" cy="60" r="1" fill="#06b6d4" opacity="0.4" filter="url(#glow)"/>
  <circle cx="45" cy="200" r="1" fill="#06b6d4" opacity="0.3" filter="url(#glow)"/>
  <circle cx="210" cy="210" r="1.5" fill="#8b5cf6" opacity="0.4" filter="url(#glow)"/>
</svg>
