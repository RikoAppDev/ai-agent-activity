name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Install discord-rpc (not in devDependencies to avoid Marketplace scanner)
              run: npm install @xhayper/discord-rpc --no-save

            - name: Check types
              run: npx tsc --noEmit

            - name: Build
              run: node esbuild.js --production
