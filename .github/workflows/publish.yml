name: Publish

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Install discord-rpc (not in devDependencies to avoid Marketplace scanner)
              run: npm install @xhayper/discord-rpc --no-save

            - name: Publish to VS Code Marketplace
              run: npx @vscode/vsce publish --no-dependencies
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
